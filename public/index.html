<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprint HUD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">🔬 Blueprint HUD</span>
      <span id="target-badge" class="badge badge-muted">loading…</span>
    </div>
    <div class="header-right">
      <span id="ws-status" class="badge badge-warn">● connecting</span>
      <button id="btn-clear" class="btn-ghost">Clear</button>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT: Traffic Log -->
    <section class="panel" id="panel-traffic">
      <div class="panel-header">
        <h2>Traffic Log</h2>
        <div class="filter-row">
          <label><input type="checkbox" id="filter-rpc" checked /> JSON-RPC</label>
          <label><input type="checkbox" id="filter-auth" checked /> Auth</label>
          <label><input type="checkbox" id="filter-sse" checked /> SSE</label>
          <label><input type="checkbox" id="filter-err" checked /> Errors</label>
        </div>
      </div>
      <div id="traffic-list" class="scroll-list"></div>
    </section>

    <!-- RIGHT: Detail + Auth Flow -->
    <div class="right-stack">

      <section class="panel" id="panel-intent">
        <div class="panel-header">
          <h2>Intent Workbench</h2>
          <span id="impact-confidence" class="badge badge-muted">No analysis</span>
        </div>
        <div class="intent-shell">
          <label for="intent-input" class="muted small">Describe the change or the problem in plain English.</label>
          <textarea id="intent-input" class="intent-input" rows="3" placeholder="Add a login requirement to the dashboard"></textarea>
          <div class="intent-actions">
            <div class="intent-suggestions">
              <button class="chip-button" data-intent="Add a login requirement to the dashboard">Login on dashboard</button>
              <button class="chip-button" data-intent="The data feels laggy when I scroll">Laggy scrolling</button>
              <button class="chip-button" data-intent="Tighten auth around the MCP inspector APIs">Tighten inspector auth</button>
            </div>
            <button id="btn-analyze-intent" class="btn-primary">Analyze impact</button>
          </div>
          <div id="impact-results" class="impact-results">
            <div class="empty-state">Describe a change to generate an impact map with likely files, runtime surfaces, risks, and an execution order.</div>
          </div>
        </div>
      </section>

      <section class="panel" id="panel-auth">
        <div class="panel-header"><h2>Auth Flow</h2></div>
        <div id="auth-sessions"></div>
      </section>

      <section class="panel" id="panel-detail">
        <div class="panel-header">
          <h2>Payload Inspector</h2>
          <span id="detail-path" class="muted small"></span>
        </div>
        <div id="detail-content" class="code-block muted small">Click a traffic entry to inspect it.</div>
      </section>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
